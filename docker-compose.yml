services:
  chough:
    build: .
    container_name: chough
    ports:
      - "8080:8080"
    environment:
      # Optional: specify custom model path inside container
      # CHOUGH_MODEL: /models
      - CHOUGH_MODEL=/home/chough/.cache/chough/models
    volumes:
      # Persist model cache to avoid re-downloading on restart
      - chough-models:/home/chough/.cache/chough/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Give time for initial model download

volumes:
  chough-models:
